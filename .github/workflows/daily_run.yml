name: Daily MoGo Tracker Pipeline

on:
  schedule:
    # Runs at 08:00 UTC (3:00 AM EST / 2:00 AM CST) every day
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows manual trigger of the pipeline from the GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # Optional: If you sync Google Drive using rclone or a similar action,
      # configure that sync here before running the pipeline.
      #
      # Example with rclone:
      # - name: Setup Rclone
      #   uses: animous/setup-rclone@v1
      #   with:
      #     rclone_config: ${{ secrets.RCLONE_CONFIG }}
      # - name: Sync Google Drive to local screenshots
      #   run: |
      #     rclone sync "gdrive:/1. Personal Projects/MoGoTracker/screenshots" ./screenshots

      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          # Override directory/file paths if using custom structures:
          # SCREENSHOTS_DIR: "/path/to/screenshots"
          # DATABASE_PATH: "/path/to/database.csv"
          # PROCESSED_LOG: "/path/to/processed_screenshots.json"
        run: |
          python run_pipeline.py

      # If you sync back to Google Drive (e.g. if files are local during run):
      # - name: Sync back to Google Drive
      #   run: |
      #     rclone sync ./screenshots "gdrive:/1. Personal Projects/MoGoTracker/screenshots"

      - name: Commit and Push Changes (Git fallback)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/sticker_database.csv screenshots/processed_screenshots.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update database and processed logs [skip ci]" && git push)
